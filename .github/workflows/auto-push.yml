name: Auto push changes

on:
  schedule:
    - cron: '0 * * * *' # hourly (change as needed)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  push-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Make changes (placeholder)
        run: |
          # Run any scripts that modify files here. Replace this with your real commands.
          echo "No-op: add your update script here"

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: automated changes by workflow"
            git push origin HEAD
          else
            echo "No changes to commit"
          fi
