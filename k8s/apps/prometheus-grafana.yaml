apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "69.8.2"
    helm:
      values: |
        grafana:
          service:
            type: LoadBalancer
          adminPassword: "admin"
          persistence:
            enabled: false
          defaultDashboardsEnabled: true

        prometheus:
          prometheusSpec:
            retention: 24h
            storageSpec: {}

        alertmanager:
          enabled: false

        nodeExporter:
          enabled: true

        kubeStateMetrics:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
